name: Deploy — staging

on:
  push:
    branches: [main]

# Only run after CI passes on the same commit.
# The concurrency group in fly-deploy.yml handles queue management per-app.
jobs:
  ci:
    uses: lehaithanh10/cartaskers-infra/.github/workflows/ci-node.yml@v1.0.0
    with:
      working-directory: "."
      node-version: "20"

  deploy:
    needs: ci
    environment: staging          # reads FLY_API_TOKEN secret + FLY_APP_NAME / FLY_CONFIG / API_URL vars
    uses: lehaithanh10/cartaskers-infra/.github/workflows/fly-deploy.yml@v1.0.0
    with:
      app-name: ${{ vars.FLY_APP_NAME }}
      fly-config: ${{ vars.FLY_CONFIG }}
      api-url: ${{ vars.API_URL }}
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
