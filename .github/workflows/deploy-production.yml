name: Deploy — production

on:
  push:
    tags:
      - "v*.*.*"           # e.g. v1.0.0, v2.3.1
  workflow_dispatch:       # manual trigger from GitHub Actions UI
    inputs:
      reason:
        description: "Why are you deploying manually?"
        required: true

# Production deploys require a human approval.
# Configure: Settings → Environments → production → Required reviewers → add yourself.
# The 5-minute wait timer there gives you a window to cancel a mis-click.
jobs:
  ci:
    uses: lehaithanh10/cartaskers-infra/.github/workflows/ci-node.yml@v1.0.0
    with:
      working-directory: "."
      node-version: "20"

  deploy:
    needs: ci
    environment: production       # PAUSES here until a reviewer approves
    uses: lehaithanh10/cartaskers-infra/.github/workflows/fly-deploy.yml@v1.0.0
    with:
      app-name: ${{ vars.FLY_APP_NAME }}
      fly-config: ${{ vars.FLY_CONFIG }}
      api-url: ${{ vars.API_URL }}
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
